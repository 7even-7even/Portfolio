<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Image Sequence</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000;
        }
        /* Lock scrolling while loading */
        body.loading {
            overflow: hidden;
        }
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: opacity 0.6s ease-out;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loading-text {
            font-size: 1.1rem;
            letter-spacing: 1px;
            font-weight: 500;
        }
        .scroll-container {
            height: 100vh;
            width: 100%;
            position: relative;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            max-width: 100%;
        }
        /* Demo content block below sequence */
        .content-below {
            height: 100vh;
            background: #111;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 2rem;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body class="loading">

    <div id="loading-overlay">
        <div class="spinner"></div>
        <span id="loading-text">Loading Frames 0%</span>
    </div>

    <!-- The pinned container -->
    <div class="scroll-container" id="sequence-container">
        <canvas id="hero-canvas"></canvas>
    </div>
    
    <!-- Additional content to demonstrate scrolling -->
    <div class="content-below">
        <h1>Scroll further down</h1>
    </div>

    <!-- GSAP & ScrollTrigger Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <script>
        gsap.registerPlugin(ScrollTrigger);

        const canvas = document.getElementById("hero-canvas");
        const context = canvas.getContext("2d");
        
        // Configuration
        const frameCount = 240;
        const images = [];
        let loadedCount = 0;
        const frameConfig = { frame: 0 };

        // Path generator: 'frames/frame_001.jpg' to 'frames/frame_240.jpg'
        const currentFrame = index => `frames/frame_${(index + 1).toString().padStart(3, '0')}.jpg`;

        // 1. Preload all frames
        for (let i = 0; i < frameCount; i++) {
            const img = new Image();
            
            // Attach onload / onerror before setting src
            img.onload = img.onerror = () => {
                loadedCount++;
                const percentage = Math.round((loadedCount / frameCount) * 100);
                document.getElementById('loading-text').innerText = `Loading Frames ${percentage}%`;
                
                // When all loaded, initialize the sequence
                if (loadedCount === frameCount) {
                    initSequence();
                }
            };
            
            img.src = currentFrame(i);
            images.push(img);
        }

        // 2. Render function drawing the frame on the canvas
        function render() {
            if (!images[frameConfig.frame] || !images[frameConfig.frame].complete) return;
            const img = images[frameConfig.frame];
            
            // To position the car on the left (e.g., at 30% of the screen width)
            // we use a focal point calculation instead of simple object-fit: cover
            const focalPointX = canvas.width * 0.30; // 30% from the left edge
            
            // Calculate scale required to cover both edges of the screen from the focal point
            const requiredScaleX = (canvas.width - focalPointX) / (img.width / 2);
            const requiredScaleXLeft = focalPointX / (img.width / 2);
            
            // The final scale must be large enough to cover the width based on the focal point, 
            // and large enough to cover the height as well.
            const scale = Math.max(
                requiredScaleX,
                requiredScaleXLeft,
                canvas.height / img.height
            );
            
            // Position the image so its center (the car) is exactly at the focal point
            const x = focalPointX - (img.width / 2) * scale;
            const y = (canvas.height / 2) - (img.height / 2) * scale;
            
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.drawImage(img, x, y, img.width * scale, img.height * scale);
        }

        // 3. Handle canvas sizing, especially for high DPI/Retina displays
        function resizeCanvas() {
            // Get device pixel ratio for sharpness
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            
            // Re-render when resized
            render();
        }

        // 4. Initialize GSAP & ScrollTrigger
        function initSequence() {
            // Fade out the loader
            const loader = document.getElementById('loading-overlay');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
                document.body.classList.remove('loading');
            }, 600);

            // Set up sizing
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Setup the GSAP timeline linked to scroll
            gsap.to(frameConfig, {
                frame: frameCount - 1,
                snap: "frame",
                ease: "none",
                scrollTrigger: {
                    trigger: "#sequence-container",
                    start: "top top",
                    end: "+=4000", // Distance to scroll over to play the sequence (px)
                    scrub: 0.5,    // Smooth scrub to avoid stutter
                    pin: true      // Pin the canvas in place
                },
                onUpdate: render
            });
        }
    </script>
</body>
</html>
